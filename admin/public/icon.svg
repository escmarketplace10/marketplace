<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Full-bleed background so the icon is safe as a maskable icon -->
  <rect width="512" height="512" fill="#EA580C"/>
  <rect width="512" height="512" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <!-- Content kept within the central ~66% safe zone -->
  <text x="256" y="256" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="300" font-weight="800" text-anchor="middle" dominant-baseline="central">K</text>
</svg>
